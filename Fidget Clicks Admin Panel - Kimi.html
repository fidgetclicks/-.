<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidget Clicks Admin Panel</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px 0;
        }

        .sidebar a:hover {
            color: white;
        }

        .main {
            margin-left: 270px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>

        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="card">
            <h3>Welcome to Fidget Clicks Admin</h3>
            <p>This is your standalone admin dashboard without Kimi branding.</p>
            <button>View Reports</button>
        </div>

        <div class="card">
            <h3>Statistics</h3>
            <p>Clicks Today: 1,245</p>
            <p>Active Users: 87</p>
        </div>
    </div>

</body>
</html>
